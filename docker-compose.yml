services:
  mysql:
    image: mysql:8.4
    container_name: nivel7-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nivel7}
      MYSQL_USER: ${MYSQL_USER:-nivel7}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nivel7}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: nivel7-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    container_name: nivel7-backend
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - mysql
      - redis
    ports:
      - "${BACKEND_PORT:-4000}:4000"

  # BullMQ: processa filas (e-mail pos-pagamento, PIX, reconciliacao). Obrigatorio para resultado chegar ao e-mail.
  worker:
    container_name: nivel7-worker
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - mysql
      - redis
    command: ["npm", "run", "worker"]

volumes:
  mysql_data:
  redis_data:
